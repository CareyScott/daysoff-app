name: Build desktop installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_API_URL: https://bv-vacation-api.vercel.app
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "BV Vacation ${{ github.ref_name }}"
          releaseBody: |
            Desktop builds for macOS and Windows.

            Unsigned builds:
            - macOS: right-click the app and choose Open the first time (or run `xattr -cr "/Applications/BV Vacation.app"`).
            - Windows: SmartScreen may warn; choose "More info" then "Run anyway".
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
